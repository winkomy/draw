function stayInfo(v){v=String(v);if(v===&quot;s&quot;)return{dbl:false,color:S.sgl,colorB:S.sgl,type:null};if(v===&quot;d&quot;)return{dbl:true,color:S.dblA,colorB:S.dblB,type:null};var p=v.split(&quot;#&quot;),t=(S.typeMap&amp;&amp;S.typeMap[p[0]])||stayType(p[0]),col=t?t.color:S.sgl;return{dbl:p[1]===&quot;d&quot;||(!p[1]&amp;&amp;t&amp;&amp;t.double),color:col,colorB:col,type:p[0]};}
function stayP(a,b,val){const p=nodeP(a),q=nodeP(b),dx=q.x-p.x,dy=q.y-p.y,len=Math.hypot(dx,dy)||1,ox=-dy/len,oy=dx/len,inf=stayInfo(val);if(inf.dbl){return segLine(p.x+ox*2.5,p.y+oy*2.5,q.x+ox*2.5,q.y+oy*2.5,inf.color,3)+segLine(p.x-ox*2.5,p.y-oy*2.5,q.x-ox*2.5,q.y-oy*2.5,inf.colorB,3);}return segLine(p.x,p.y,q.x,q.y,inf.color,4.4);}
function stayGroups2Bom(){var g=stayGroups(),out=[],i=0;Object.keys(g.map).sort(function(a,b){return g.map[a].len-g.map[b].len;}).forEach(function(tid){var m=g.map[tid],det=[];if(m.s)det.push(m.s+&quot; single&quot;);if(m.d)det.push(m.d+&quot; double&quot;);out.push([&quot;\u2022 &quot;+m.label,m.lenStr+&quot; \u00b7 &quot;+det.join(&quot; + &quot;),m.s+m.d,null,&quot;stayg&quot;+(i++)]);});return out;}

  for(var lv in S.levels){for(var k in S.levels[lv]){var pr=k.split(&quot;|&quot;),a=pr[0].split(&quot;,&quot;).map(Number),b=pr[1].split(&quot;,&quot;).map(Number);var dd=Math.hypot(a[0]-b[0],a[1]-b[1])*4;var ft=Math.floor(dd),inch=Math.round((dd-ft)*12);if(inch===12){ft++;inch=0;}var lenStr=ft+&quot;'-&quot;+inch+'\u2033';var inf=stayInfo(S.levels[lv][k]);var tid=inf.type||(&quot;L:&quot;+lenStr);var t=(S.typeMap&amp;&amp;S.typeMap[tid])||stayType(tid);if(!map[tid])map[tid]={label:t?t.label:lenStr,color:inf.color,colorB:inf.colorB,len:dd,lenStr:lenStr,s:0,d:0,dblAny:false};if(inf.dbl){map[tid].d++;map[tid].dblAny=true;}else map[tid].s++;tot++;}}
  return{map:map,tot:tot};}

  document.querySelectorAll(&quot;[data-step]&quot;).forEach(el=>el.classList.toggle(&quot;off&quot;,el.getAttribute(&quot;data-step&quot;)!=String(n)));
  document.getElementById(&quot;stepTab1&quot;).classList.toggle(&quot;on&quot;,n===1);
  document.getElementById(&quot;stepTab2&quot;).classList.toggle(&quot;on&quot;,n===2);
